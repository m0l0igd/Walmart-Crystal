`yaml
name: Update Live Crystal Portal

on:
  schedule:
    - cron: '/15    *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-cloud-bigquery --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple --allow-insecure-host pypi.ci.artifacts.walmart.com

    - name: Authenticate to Google Cloud
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Rebuild Static Portal with Live Data
      run: |
        python build_crystal_portal.py

    - name: Commit and Push Updated Portal
      run: |
        git config --global user.name "PupBot [Bot]"
        git config --global user.email "pupbot@walmart.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "🐾 Auto-updated Crystal Portal live stats [Skip CI]"
        git push
